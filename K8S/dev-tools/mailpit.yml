apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: inventory-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      serviceAccountName: dev-tools-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          ports:
            - containerPort: 1025   # SMTP
              name: smtp
            - containerPort: 8025   # Web UI
              name: webui

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

          # securityContext:
          #   allowPrivilegeEscalation: false
          #   readOnlyRootFilesystem: true
          #   capabilities:
          #     drop: ["ALL"]

          readinessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit                  # matches EMAIL_HOST in configmap
  namespace: inventory-dev
spec:
  selector:
    app: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: webui
      port: 8025
      targetPort: 8025