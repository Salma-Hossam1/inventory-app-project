apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: inventory-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisinsight
  template:
    metadata:
      labels:
        app: redisinsight
    spec:
      serviceAccountName: dev-tools-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: redisinsight
          image: redis/redisinsight:latest
          ports:
            - containerPort: 5540

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # redisinsight writes local db
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: redisinsight-data
              mountPath: /data

          readinessProbe:
            httpGet:
              path: /
              port: 5540
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: redisinsight-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight-service
  namespace: inventory-dev
spec:
  selector:
    app: redisinsight
  ports:
    - port: 5540
      targetPort: 5540