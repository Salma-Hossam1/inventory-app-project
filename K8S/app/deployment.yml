apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
  namespace: inventory-prod
  labels:
    app: inventory-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: inventory-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: inventory-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: inventory-app-sa
      automountServiceAccountToken: false

      # ── Wait for DBs ──
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -z postgres 5432 && echo "postgres is up" && exit 0
                echo "waiting for postgres..."
                sleep 2
              done
              echo "postgres not reachable" && exit 1

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -z redis 6379 && echo "redis is up" && exit 0
                echo "waiting for redis..."
                sleep 2
              done
              echo "redis not reachable" && exit 1

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      containers:
        - name: inventory-app
          image: salmahossam12/inventory-app:v2
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: START_MODE
              value: "api"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET

            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: EMAIL_USER

            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: EMAIL_PASS

          envFrom:
            - configMapRef:
                name: app-config

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads


          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            failureThreshold: 12
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: uploads
          emptyDir: {}