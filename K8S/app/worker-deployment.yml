apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-worker
  namespace: inventory-prod

spec:
  replicas: 2

  selector:
    matchLabels:
      app: inventory-worker

  template:
    metadata:
      labels:
        app: inventory-worker

    spec:
      serviceAccountName: inventory-app-sa

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -z redis 6379 && echo "redis is up" && exit 0
                sleep 2
              done
              echo "redis not reachable" && exit 1

        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -z postgres 5432 && echo "postgres is up" && exit 0
                sleep 2
              done
              echo "postgres not reachable" && exit 1

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      containers:
        - name: inventory-worker
          image: salmahossam12/inventory-app:v2
          imagePullPolicy: Always

       
          command: ["node", "dist/main.js"]

          envFrom:
            - configMapRef:
                name: app-config

          env:
            - name: START_MODE
              value: "worker"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: JWT_SECRET

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: uploads
          emptyDir: {}