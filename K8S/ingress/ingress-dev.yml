apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventory-ingress-dev
  namespace: inventory-dev
  annotations:
    # kubernetes.io/ingress.class: "nginx"
    # no TLS in dev — http only, local access
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    # - host: inventory.local              # add to /etc/hosts → 127.0.0.1
    #   http:
    #     paths:
    #       - path: /api
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: inventory-app-service
    #             port:
    #               number: 3000

    # ── Dev tools exposed via ingress ──
    - host: pgadmin.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pgadmin-service
                port:
                  number: 80

    - host: redisinsight.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redisinsight-service
                port:
                  number: 5540

    - host: mailpit.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailpit
                port:
                  number: 8025